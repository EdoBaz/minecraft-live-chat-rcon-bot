<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickaxe Progress Vertical</title>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
        }
        #pickaxe {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            margin-top: 10px;
        }
        #bar-container {
            position: relative;
            width: 32px;
            flex-grow: 1;
            margin: 10px 0;
            background-color: #3a3a3a;
            border: 2px solid #555;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
        }
        #bar-fill {
            background-color: #4caf50;
            width: 100%;
            transition: height 0.3s ease-in-out;
        }
        #block {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            margin-bottom: 10px;
        }
        #text {
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 25px;
        }
    </style>
</head>
<body>
    <img id="pickaxe" src="pickaxe/wooden.png" alt="Pickaxe">
    <div id="bar-container">
        <div id="bar-fill" style="height: 0%;"></div>
    </div>
    <img id="block" src="pickaxe/stone_block.png" alt="Stone Block">
    <div id="text">0 / 10.000.000</div>

    <script>
        const pickaxe = document.getElementById("pickaxe");
        const barFill = document.getElementById("bar-fill");
        const text = document.getElementById("text");

        const thresholds = [
            [5000, "netherite"],
            [2500, "diamond"],
            [1500, "golden"],
            [500, "iron"],
            [100, "stone"],
            [0, "wooden"]
        ];

        async function readFile(path) {
            try {
                const response = await fetch(path + "?v=" + Date.now());
                if (!response.ok) throw new Error("HTTP error " + response.status);
                return (await response.text()).trim();
            } catch {
                return null;
            }
        }

        async function updateWidget() {
            const [followerText, blockText] = await Promise.all([
                readFile("../follower_count.txt"),
                readFile("../blocks_count.txt")
            ]);

            const followers = parseInt(followerText) || 0;
            const blocks = parseInt(blockText) || 0;
            const percent = Math.min(100, (blocks / 10000000) * 100);

            const pick = thresholds.find(t => followers >= t[0])[1];
            pickaxe.src = `pickaxe/${pick}.png`;

            barFill.style.height = percent + "%";
            text.textContent = `${blocks.toLocaleString()} / 10.000.000`;
        }

        setInterval(updateWidget, 2000);
        updateWidget();
    </script>
</body>
</html>
